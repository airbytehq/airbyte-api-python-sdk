[tasks]

[tasks._generate-code]
help = "Generate Python SDK from OpenAPI spec. Set VERSION env var to pin version."
shell = """
ARGS="--skip-compile"
if [ -n "$VERSION" ]; then
    ARGS="$ARGS --set-version=$VERSION"
fi
speakeasy run $ARGS
"""

[tasks._post-generate]
help = "Run post-generation patches."
shell = """
uv run scripts/post_generate.uv
"""

[tasks._generate-readme]
help = "Generate README-PYPI.md from README.md (rewrites relative links to absolute GitHub URLs)."
shell = """
uv run python scripts/prepare_readme.py
"""

[tasks.lint]
help = "Run linting checks on generated code."
shell = """
uv run ruff check src/
uv run ruff format --check src/
"""

[tasks.fix]
help = "Auto-fix linting and formatting issues."
shell = """
uv run ruff check --fix src/
uv run ruff format src/
"""

[tasks.test]
help = "Run tests."
shell = """
uv run pytest tests/ -v
"""

[tasks.typecheck]
help = "Run type checking."
shell = """
uv run pyright src/
"""

[tasks.build]
help = "Build the Python package."
shell = """
uv build
"""

[tasks.generate-full]
help = "Full generation pipeline: generate code, prepare readme, post-generate patches."
sequence = ["_generate-code", "_generate-readme", "_post-generate"]
