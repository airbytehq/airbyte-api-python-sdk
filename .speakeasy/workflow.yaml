workflowVersion: 1.0.0
# `pinned` tells the Speakeasy CLI to use whatever version is currently installed
# without attempting a blue/green auto-upgrade. The actual version is pinned in
# .github/speakeasy/dummy-compose.yml and bumped by Dependabot's `docker-compose` ecosystem.
# https://www.speakeasy.com/docs/speakeasy-reference/workflow-file#speakeasy-version
speakeasyVersion: pinned
sources:
    airbyte-api:
        inputs:
            - location: https://raw.githubusercontent.com/airbytehq/airbyte-platform/refs/heads/main/airbyte-api/server-api/src/main/openapi/api_sdk.yaml
        overlays:
            - location: ./overlays/python_speakeasy.yaml
        registry:
            location: registry.speakeasyapi.dev/airbyte/airbyte-prod/my-source
targets:
    python-api:
        target: python
        source: airbyte-api
        codeSamples:
            registry:
                location: registry.speakeasyapi.dev/airbyte/airbyte-prod/my-source-python-code-samples
            blocking: false
